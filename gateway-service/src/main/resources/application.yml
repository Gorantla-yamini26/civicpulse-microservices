server:
  port: 8090

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/users/**
        - id: citizen-service
          uri: lb://citizen-service
          predicates:
            - Path=/api/v1/citizens/**
        - id: grievance-service
          uri: lb://grievance-service
          predicates:
            - Path=/api/v1/grievances/**
        - id: service-management-service
          uri: lb://service-management-service
          predicates:
            - Path=/api/services/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8765/eureka/
  instance:
    prefer-ip-address: true

---
spring:
  config:
    activate:
      on-profile: docker
eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8765/eureka/
